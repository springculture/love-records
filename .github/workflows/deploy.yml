name: 部署到 Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy-worker:
    name: 部署 Worker (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./worker

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        run: npm ci

      - name: 运行 D1 数据库迁移
        run: npx wrangler d1 migrations apply love-records-db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 部署 Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-frontend:
    name: 部署前端 (Pages)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        run: npm ci

      - name: 构建前端
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: 部署到 Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=love-records --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
